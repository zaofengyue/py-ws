name: Build and Push

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release files (for 文件上传部署)
        run: |
          mkdir -p release
          cp app.py release/app.py
          cd release && zip -r ../py-ws.zip .

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/py-ws:latest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: py-ws.zip
          body: |
            ## py-ws

            两种部署方式：

            1. **Docker**：`docker pull ghcr.io/${{ github.repository_owner }}/py-ws:latest`
            2. **文件上传**：下载 `py-ws.zip` 解压后，将 `app.py` 上传到目标平台，运行 `python app.py`

            部署前必须设置环境变量 `DOMAIN` 为平台分配的公网域名，否则节点无法生成有效连接信息。
